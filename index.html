<html>
<body>
<script type="text/javascript">
const d = new Date();
const h = d.getHours();
if(h>=0 && h<12) {
    document.write("Good Morning");
}
else if (h >= 12 && h < 16) {
    document.write("Good Afternoon");
}
else if (h>=16 && h<20) {
    document.write("Good Evening");
}
else {
    document.write("Good Night");
}
</script>
</body>
</html>
